<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>🎾 Live Tennis Match Tracker – Shareable Scores</title>
  <!-- Firebase SDKs (real-time sync) -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <!-- React & Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; font-family: 'Oswald', sans-serif; }
    input, select { outline: none; }
    input:focus, select:focus { border-color: #7CFC00 !important; }
    .btn-hover:hover { opacity: 0.85; transform: scale(1.02); }
    .btn-hover:active { transform: scale(0.98); }
    .remove-btn:hover { color: #ff6b6b !important; border-color: #ff6b6b !important; }
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-1px); }
    .sbtn { transition: all 0.15s; cursor: pointer; }
    .sbtn:hover { opacity: 0.85; transform: scale(1.05); }
    .sbtn:active { transform: scale(0.97); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #7CFC00; border-radius: 2px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes pop { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .pulse { animation: pulse 1.4s infinite; }
    .pop { animation: pop 0.3s ease; }
    .skill-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔥 REPLACE WITH YOUR FIREBASE CONFIGURATION 🔥
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ---------- Helper functions ----------
    const PALETTE = [
      "#FF6B6B","#4ECDC4","#FFE66D","#A8E6CF","#FF8B94",
      "#B5EAD7","#C7CEEA","#FFDAC1","#F0B27A","#85C1E9",
      "#C39BD3","#82E0AA","#F9E79F","#FAD7A0","#AED6F1","#A9DFBF"
    ];

    function getPhase(s1, s2, prevPhase) {
      const total = s1 + s2;
      if (prevPhase === "sudden") return { label: "WINNER!", phase: "done" };
      if (prevPhase === "deuce") {
        if (s1 !== s2) return { label: "WINNER!", phase: "done" };
        return { label: "SUDDEN DEATH", phase: "sudden" };
      }
      if (prevPhase === "extra") {
        if (total === 5) {
          if (s1 !== s2) return { label: "WINNER!", phase: "done" };
          return { label: "DEUCE", phase: "deuce" };
        }
      }
      if (total < 4) return { label: "SERVE " + (total + 1) + " / 4", phase: "live" };
      if (total === 4) {
        if (s1 === 2 && s2 === 2) return { label: "EXTRA ROUND", phase: "extra" };
        return { label: "WINNER!", phase: "done" };
      }
      return { label: "LIVE", phase: "live" };
    }

    // ---------- SKILL-BASED MATCH GENERATOR ----------
    function getAllValidMatches(players, playerSkills) {
      const beginners = players.filter(p => playerSkills[p] === "beginner");
      const intermediates = players.filter(p => playerSkills[p] === "intermediate");
      const allTeams = [];
      for (const b of beginners) {
        for (const im of intermediates) {
          allTeams.push([b, im].sort());
        }
      }
      const matches = [];
      for (let i = 0; i < allTeams.length; i++) {
        for (let j = i+1; j < allTeams.length; j++) {
          const t1 = allTeams[i];
          const t2 = allTeams[j];
          const allPlayers = [...t1, ...t2];
          if (new Set(allPlayers).size === 4) {
            matches.push({ t1: [...t1], t2: [...t2], players: allPlayers });
          }
        }
      }
      return matches;
    }

    function selectBalancedMatches(allMatches, totalMatches, players) {
      if (totalMatches === 0) return [];
      if (allMatches.length === 0) return [];
      const counts = Object.fromEntries(players.map(p => [p, 0]));
      const selected = [];
      let availablePool = [...allMatches];
      for (let mIdx = 0; mIdx < totalMatches; mIdx++) {
        if (availablePool.length === 0) availablePool = [...allMatches];
        let bestMatch = null;
        let bestScore = Infinity;
        for (const match of availablePool) {
          const newCounts = { ...counts };
          for (const p of match.players) newCounts[p] += 1;
          let sumSq = 0;
          for (const p of players) sumSq += newCounts[p] * newCounts[p];
          if (sumSq < bestScore) {
            bestScore = sumSq;
            bestMatch = match;
          } else if (sumSq === bestScore && bestMatch && Math.random() < 0.5) bestMatch = match;
        }
        if (bestMatch) {
          for (const p of bestMatch.players) counts[p] += 1;
          selected.push({ id: selected.length + 1, t1: bestMatch.t1, t2: bestMatch.t2, out: players.filter(p => !bestMatch.players.includes(p)) });
          const idx = availablePool.indexOf(bestMatch);
          if (idx !== -1) availablePool.splice(idx, 1);
        } else break;
      }
      return selected;
    }

    function generateSkillMatches(players, playerSkills, totalMatches) {
      const allValid = getAllValidMatches(players, playerSkills);
      if (allValid.length === 0) return [];
      return selectBalancedMatches(allValid, totalMatches, players);
    }

    // ---------- SETUP SCREEN (generates session and redirects) ----------
    function SetupScreen() {
      const defaultPlayers = [
        { name: "Ricky", skill: "beginner" },
        { name: "feli", skill: "beginner" },
        { name: "hansen", skill: "intermediate" },
        { name: "indra (jam 4)", skill: "intermediate" },
        { name: "cecil", skill: "beginner" },
        { name: "chris", skill: "intermediate" },
        { name: "Pitnal", skill: "intermediate" },
        { name: "edwin", skill: "intermediate" },
        { name: "mira", skill: "beginner" },
        { name: "fely", skill: "beginner" }
      ];
      const [players, setPlayers] = useState(defaultPlayers);
      const [matchCount, setMatchCount] = useState(20);
      const [error, setError] = useState("");
      const [isCreating, setIsCreating] = useState(false);

      function updatePlayer(i, field, value) {
        const updated = [...players];
        if (field === "name") updated[i].name = value;
        else if (field === "skill") updated[i].skill = value;
        setPlayers(updated);
      }
      function addPlayer() { if (players.length >= 16) return; setPlayers([...players, { name: "Player " + (players.length+1), skill: "beginner" }]); }
      function removePlayer(i) { if (players.length <= 4) return; setPlayers(players.filter((_, idx) => idx !== i)); }

      async function handleStart() {
        const names = players.map(p => p.name.trim()).filter(Boolean);
        if (names.length < 4) { setError("Need at least 4 players!"); return; }
        const dupes = names.filter((n, i) => names.indexOf(n) !== i);
        if (dupes.length) { setError("Duplicate names: " + [...new Set(dupes)].join(", ")); return; }
        const beginners = players.filter(p => p.skill === "beginner").length;
        const intermediates = players.filter(p => p.skill === "intermediate").length;
        if (beginners === 0 || intermediates === 0) { setError("Need at least one beginner AND one intermediate!"); return; }
        if (beginners < 2 || intermediates < 2) { setError("Need at least 2 beginners and 2 intermediates for a match!"); return; }
        setError("");
        setIsCreating(true);

        const playerNames = players.map(p => p.name);
        const playerSkills = Object.fromEntries(players.map(p => [p.name, p.skill]));
        const matches = generateSkillMatches(playerNames, playerSkills, matchCount);
        if (matches.length === 0) {
          setError("Not enough valid matches. Increase match count or adjust skills.");
          setIsCreating(false);
          return;
        }

        // Create a new session in Firestore
        const sessionID = Math.random().toString(36).substring(2, 15);
        const initialScores = Object.fromEntries(matches.map(m => [m.id, {s1:0,s2:0,done:false,winner:null,phase:"live"}]));
        const sessionData = {
          players: playerNames,
          matches: matches,
          playerSkills: playerSkills,
          scores: initialScores,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
          await db.collection("tennis_sessions").doc(sessionID).set(sessionData);
          // Redirect to the new session URL
          window.location.href = `${window.location.pathname}?sessionID=${sessionID}`;
        } catch (err) {
          console.error(err);
          setError("Failed to create session: " + err.message);
          setIsCreating(false);
        }
      }

      return (
        <div style={{minHeight:"100vh",background:"#0a0e1a",color:"#f0f0f0",padding:"0 0 60px"}}>
          <div style={{background:"linear-gradient(135deg,#0f1923,#1a2535)",borderBottom:"3px solid #7CFC00",padding:"20px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"#7CFC00",letterSpacing:5}}>LIVE DOUBLES TENNIS</div>
            <div style={{fontSize:32,fontWeight:700}}>SHAREABLE SCORESHEET</div>
          </div>
          <div style={{maxWidth:550,margin:"0 auto",padding:"24px 20px"}}>
            <div className="fade-up" style={{marginBottom:28}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div><div style={{fontSize:11,color:"#7CFC00"}}>PLAYERS (skill)</div><div style={{fontSize:13,color:"#555"}}>{players.length} players</div></div>
                <button className="btn-hover" onClick={addPlayer} disabled={players.length >= 16} style={{background:"#7CFC00",color:"#000",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",opacity:players.length>=16?0.4:1}}>+ ADD</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {players.map((p, i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:PALETTE[i%PALETTE.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#000",flexShrink:0}}>{i+1}</div>
                    <input value={p.name} onChange={e => updatePlayer(i, "name", e.target.value)} style={{flex:2,background:"#111827",border:"1px solid #1f2937",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:14}} />
                    <select value={p.skill} onChange={e => updatePlayer(i, "skill", e.target.value)} style={{flex:1,background:"#111827",border:"1px solid #1f2937",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer"}}>
                      <option value="beginner">🟢 Beginner</option>
                      <option value="intermediate">🔵 Intermediate</option>
                    </select>
                    <button className="remove-btn" onClick={() => removePlayer(i)} disabled={players.length <= 4} style={{background:"none",border:"1px solid #333",color:"#555",borderRadius:6,width:32,height:32,cursor:"pointer",opacity:players.length<=4?0.3:1}}>✕</button>
                  </div>
                ))}
              </div>
            </div>

            <div className="fade-up" style={{marginBottom:28}}>
              <div style={{fontSize:11,color:"#7CFC00",marginBottom:6}}>NUMBER OF MATCHES</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button onClick={() => setMatchCount(Math.max(4, matchCount-1))} style={{background:"#1f2937",border:"none",color:"#fff",borderRadius:8,width:40,height:40,fontSize:20,cursor:"pointer"}}>−</button>
                <div style={{flex:1,background:"#111827",border:"1px solid #1f2937",borderRadius:8,padding:"10px",textAlign:"center",fontSize:24,fontWeight:700,fontFamily:"Roboto Mono",color:"#7CFC00"}}>{matchCount}</div>
                <button onClick={() => setMatchCount(Math.min(50, matchCount+1))} style={{background:"#1f2937",border:"none",color:"#fff",borderRadius:8,width:40,height:40,fontSize:20,cursor:"pointer"}}>+</button>
              </div>
            </div>

            {error && <div style={{background:"#2a1010",border:"1px solid #ff6b6b",borderRadius:8,padding:"10px",color:"#ff6b6b",fontSize:13,marginBottom:16}}>{error}</div>}

            <button className="btn-hover" onClick={handleStart} disabled={isCreating} style={{width:"100%",background:"#7CFC00",color:"#000",border:"none",borderRadius:10,padding:"16px",fontSize:20,fontWeight:700,letterSpacing:3,cursor:"pointer",opacity:isCreating?0.6:1}}>
              {isCreating ? "Creating session... ⏳" : "🎾 GENERATE LIVE SESSION"}
            </button>
          </div>
        </div>
      );
    }

    // ---------- SCORESHEET (loads from Firestore using sessionID in URL) ----------
    function Scoresheet({ onReset }) {
      const [sessionID] = useState(() => new URLSearchParams(window.location.search).get('sessionID'));
      const [players, setPlayers] = useState(null);
      const [matches, setMatches] = useState(null);
      const [playerSkills, setPlayerSkills] = useState(null);
      const [scores, setScores] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [activeMatch, setActiveMatch] = useState(null);
      const [view, setView] = useState("matches");

      useEffect(() => {
        if (!sessionID) {
          setError("No session ID found. Please go back and generate a session.");
          setLoading(false);
          return;
        }
        const docRef = db.collection("tennis_sessions").doc(sessionID);
        const unsubscribe = docRef.onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            setPlayers(data.players);
            setMatches(data.matches);
            setPlayerSkills(data.playerSkills);
            setScores(data.scores || {});
            setLoading(false);
          } else {
            setError("Session not found. It may have been deleted or the link is incorrect.");
            setLoading(false);
          }
        }, (err) => {
          console.error(err);
          setError("Failed to load session: " + err.message);
          setLoading(false);
        });
        return () => unsubscribe();
      }, [sessionID]);

      const addPoint = async (matchId, team) => {
        if (!sessionID) return;
        const docRef = db.collection("tennis_sessions").doc(sessionID);
        try {
          await db.runTransaction(async (transaction) => {
            const doc = await transaction.get(docRef);
            if (!doc.exists) return;
            const currentScores = doc.data().scores;
            const cur = currentScores[matchId];
            if (cur.done) return;
            let s1 = cur.s1, s2 = cur.s2;
            if (team === 1) s1++; else s2++;
            const match = matches.find(m => m.id === matchId);
            const ph = getPhase(s1, s2, cur.phase);
            const done = ph.phase === "done";
            const winner = done ? (s1 > s2 ? match.t1 : match.t2) : null;
            const newScores = {
              ...currentScores,
              [matchId]: { s1, s2, done, winner, phase: done ? "done" : ph.phase }
            };
            transaction.update(docRef, { scores: newScores });
          });
        } catch (err) {
          console.error(err);
          alert("Failed to add point: " + err.message);
        }
      };

      const resetMatch = async (matchId) => {
        if (!sessionID) return;
        const docRef = db.collection("tennis_sessions").doc(sessionID);
        try {
          await db.runTransaction(async (transaction) => {
            const doc = await transaction.get(docRef);
            if (!doc.exists) return;
            const currentScores = doc.data().scores;
            const newScores = {
              ...currentScores,
              [matchId]: { s1:0, s2:0, done:false, winner:null, phase:"live" }
            };
            transaction.update(docRef, { scores: newScores });
          });
        } catch (err) {
          console.error(err);
          alert("Failed to reset match: " + err.message);
        }
      };

      if (loading) return <div style={{color:"white",textAlign:"center",marginTop:50}}>Loading session... ⏳</div>;
      if (error) return (
        <div style={{color:"white",textAlign:"center",marginTop:50}}>
          <div style={{color:"#ff6b6b",marginBottom:20}}>⚠️ {error}</div>
          <button onClick={onReset} style={{background:"#7CFC00",border:"none",borderRadius:8,padding:"10px 20px",cursor:"pointer"}}>Go Back to Setup</button>
        </div>
      );
      if (!players || !matches) return <div style={{color:"white",textAlign:"center",marginTop:50}}>Invalid session data.</div>;

      const colorMap = Object.fromEntries(players.map((p, i) => [p, PALETTE[i % PALETTE.length]]));
      const completedCount = Object.values(scores).filter(s => s?.done).length;
      const leaderboard = players.map(p => {
        let totalPoints = 0, wins = 0, played = 0;
        matches.forEach(m => {
          const sc = scores[m.id];
          if (sc?.done) {
            const team1Points = sc.s1, team2Points = sc.s2;
            const inTeam1 = m.t1.includes(p), inTeam2 = m.t2.includes(p);
            if (inTeam1 || inTeam2) {
              played++;
              const pointsEarned = inTeam1 ? team1Points : team2Points;
              totalPoints += pointsEarned;
              const isWinner = (team1Points > team2Points && inTeam1) || (team2Points > team1Points && inTeam2);
              if (isWinner) wins++;
            }
          }
        });
        return { name: p, points: totalPoints, wins, played, skill: playerSkills[p] };
      }).sort((a,b) => b.points - a.points || b.wins - a.wins);
      const maxPoints = leaderboard.length ? leaderboard[0].points : 1;

      const phaseColors = { done:"#7CFC00", extra:"#ff6b6b", deuce:"#ff8c00", sudden:"#cc0000", live:"#1f2937" };
      const phaseEmojis = { done:"🏆", extra:"⚡", deuce:"🔥", sudden:"💀", live:"●" };
      const shareUrl = window.location.href;

      return (
        <div style={{minHeight:"100vh",background:"#0a0e1a",color:"#f0f0f0"}}>
          <div style={{background:"linear-gradient(135deg,#0f1923,#1a2535)",borderBottom:"3px solid #7CFC00",padding:"14px 20px"}}>
            <div style={{maxWidth:600,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"#7CFC00",letterSpacing:4}}>LIVE DOUBLES</div>
                <div style={{fontSize:24,fontWeight:700}}>REAL-TIME SCORES</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:"#555"}}>DONE</div>
                  <div style={{fontSize:26,fontWeight:700,color:"#7CFC00",fontFamily:"Roboto Mono"}}>{completedCount}<span style={{color:"#333",fontSize:14}}>/{matches.length}</span></div>
                </div>
                <button onClick={onReset} style={{background:"none",border:"1px solid #333",color:"#555",borderRadius:8,padding:"6px 12px",fontSize:10,letterSpacing:2,cursor:"pointer"}}>⚙ SETUP</button>
              </div>
            </div>
            <div style={{maxWidth:600,margin:"8px auto 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{background:"#1f2d3d",borderRadius:4,height:5,flex:1}}>
                <div style={{height:"100%",width:`${(completedCount/matches.length)*100}%`,background:"linear-gradient(90deg,#7CFC00,#00FF7F)",borderRadius:4}} />
              </div>
              <button onClick={() => { navigator.clipboard.writeText(shareUrl); alert("Link copied! Share it on WhatsApp."); }} style={{marginLeft:12,background:"#25D366",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:"#000",cursor:"pointer"}}>📱 SHARE MATCH</button>
            </div>
          </div>

          <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px"}}>
            <div style={{display:"flex",borderBottom:"1px solid #1f2937"}}>
              {["matches","leaderboard"].map(v => (
                <button key={v} onClick={() => setView(v)} style={{background:"none",border:"none",color:view===v?"#7CFC00":"#555",fontSize:12,letterSpacing:3,fontWeight:600,padding:"12px 18px",cursor:"pointer",borderBottom:view===v?"2px solid #7CFC00":"2px solid transparent"}}>
                  {v === "matches" ? "🎾 Matches" : "🏆 Points"}
                </button>
              ))}
            </div>

            {view === "matches" && (
              <div style={{paddingTop:14,paddingBottom:50}}>
                {matches.map(m => {
                  const sc = scores[m.id] || { s1:0, s2:0, done:false, winner:null, phase:"live" };
                  const isActive = activeMatch === m.id;
                  const ph = getPhase(sc.s1, sc.s2, sc.phase);
                  const total = sc.s1 + sc.s2;
                  return (
                    <div key={m.id} className="card" style={{background:isActive?"#0d1420":"#111827",border:isActive?"1px solid #7CFC00":sc.done?"1px solid #1a3a1a":"1px solid #1f2937",borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                      <div onClick={() => setActiveMatch(isActive ? null : m.id)} style={{display:"flex",alignItems:"center",padding:"12px 14px",cursor:"pointer",gap:10}}>
                        <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:sc.done?"#1a3a1a":isActive?"#7CFC00":"#1f2937",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:sc.done?"#7CFC00":isActive?"#000":"#555"}}>{m.id}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                            <span style={{color:colorMap[m.t1[0]]}}>{m.t1[0]}</span> & <span style={{color:colorMap[m.t1[1]]}}>{m.t1[1]}</span>
                            <span style={{color:"#7CFC00",margin:"0 6px"}}>VS</span>
                            <span style={{color:colorMap[m.t2[0]]}}>{m.t2[0]}</span> & <span style={{color:colorMap[m.t2[1]]}}>{m.t2[1]}</span>
                          </div>
                          {sc.done && sc.winner && <div className="pop" style={{fontSize:10,color:"#7CFC00"}}>🏆 {sc.winner.join(" & ")} won {sc.s1}-{sc.s2}</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {(sc.s1>0||sc.s2>0) && <span style={{fontFamily:"Roboto Mono",fontSize:16,fontWeight:700}}>{sc.s1}<span style={{color:"#333"}}>-</span>{sc.s2}</span>}
                          <span style={{color:sc.done?"#7CFC00":"#555"}}>{sc.done?"✓":isActive?"▲":"▼"}</span>
                        </div>
                      </div>
                      {isActive && (
                        <div style={{borderTop:"1px solid #1f2937",padding:"16px 14px"}}>
                          <div style={{textAlign:"center",marginBottom:14}}>
                            <span className={sc.done?"pop":"pulse"} style={{display:"inline-block",fontSize:11,letterSpacing:3,fontWeight:700,padding:"5px 18px",borderRadius:20,background:phaseColors[sc.done?"done":sc.phase]||"#1f2937",color:sc.phase==="done"?"#000":"#fff"}}>
                              {phaseEmojis[sc.done?"done":sc.phase]} {ph.label}
                            </span>
                          </div>
                          {!sc.done && sc.phase === "live" && (
                            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:14}}>
                              {[1,2,3,4].map(n => <div key={n} style={{width:10,height:10,borderRadius:"50%",background:n<=total?"#7CFC00":"#1f2937",border:"1px solid",borderColor:n<=total?"#7CFC00":"#333"}} />)}
                            </div>
                          )}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 32px 1fr",alignItems:"center",gap:10,marginBottom:14}}>
                            {[{team:m.t1,s:sc.s1,num:1},{team:m.t2,s:sc.s2,num:2}].map((side, idx) => (
                              idx === 0 ? (
                                <div key={idx} style={{textAlign:"center"}}>
                                  <div style={{marginBottom:6}}>{side.team.map(p => <div key={p} style={{fontSize:12,fontWeight:600,color:colorMap[p]}}>{p}</div>)}</div>
                                  <div style={{fontSize:52,fontWeight:700,fontFamily:"Roboto Mono",lineHeight:1,color:sc.winner?.includes(side.team[0])?"#7CFC00":"#fff"}}>{side.s}</div>
                                  {!sc.done && <button className="sbtn" onClick={() => addPoint(m.id, side.num)} style={{marginTop:10,background:"#7CFC00",color:"#000",border:"none",borderRadius:8,padding:"8px 20px",fontSize:16,fontWeight:700}}>+ PT</button>}
                                </div>
                              ) : (
                                <React.Fragment key={idx}>
                                  <div style={{textAlign:"center",color:"#333",fontSize:16,fontWeight:700}}>VS</div>
                                  <div style={{textAlign:"center"}}>
                                    <div style={{marginBottom:6}}>{side.team.map(p => <div key={p} style={{fontSize:12,fontWeight:600,color:colorMap[p]}}>{p}</div>)}</div>
                                    <div style={{fontSize:52,fontWeight:700,fontFamily:"Roboto Mono",lineHeight:1,color:sc.winner?.includes(side.team[0])?"#7CFC00":"#fff"}}>{side.s}</div>
                                    {!sc.done && <button className="sbtn" onClick={() => addPoint(m.id, side.num)} style={{marginTop:10,background:"#7CFC00",color:"#000",border:"none",borderRadius:8,padding:"8px 20px",fontSize:16,fontWeight:700}}>+ PT</button>}
                                  </div>
                                </React.Fragment>
                              )
                            ))}
                          </div>
                          <div style={{background:"#0a0e1a",borderRadius:8,padding:"8px 12px",fontSize:10,color:"#444",marginBottom:10}}>
                            <span style={{color:"#7CFC00"}}>RULES: </span>4 serves · 4-0/3-1 wins · 2-2 → Extra → Deuce → Sudden Death
                          </div>
                          <div style={{textAlign:"center"}}>
                            <button className="sbtn" onClick={() => resetMatch(m.id)} style={{background:"none",border:"1px solid #2a2a2a",color:"#444",borderRadius:6,padding:"5px 14px",fontSize:10,letterSpacing:2,cursor:"pointer"}}>RESET MATCH</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {view === "leaderboard" && (
              <div style={{paddingTop:18,paddingBottom:50}}>
                {leaderboard.map((p, i) => (
                  <div key={p.name} style={{background:i===0 && p.points>0?"linear-gradient(135deg,#0d2210,#111827)":"#111827",border:i===0 && p.points>0?"1px solid #2d5a2d":"1px solid #1f2937",borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:i===0 && p.points>0?"#7CFC00":"#1f2937",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:i===0 && p.points>0?"#000":"#555"}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <span style={{fontSize:16,fontWeight:600,color:colorMap[p.name]}}>{p.name}<span className="skill-badge" style={{background: p.skill === "beginner" ? "#4CAF50" : "#2196F3", width:12, height:12, display:"inline-block", marginLeft:8}}></span></span>
                        <span><span style={{color:"#7CFC00",fontWeight:700}}>{p.points} PTS</span> <span style={{color:"#444"}}>· {p.wins}W/{p.played}</span></span>
                      </div>
                      <div style={{background:"#0a0e1a",borderRadius:4,height:5}}><div style={{height:"100%",width:`${(p.points/maxPoints)*100}%`,background:colorMap[p.name],borderRadius:4}} /></div>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:20,background:"#111827",border:"1px solid #1f2937",borderRadius:10,padding:"14px"}}>
                  <div style={{fontSize:10,color:"#555",letterSpacing:3,marginBottom:12}}>SESSION SUMMARY</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,textAlign:"center"}}>
                    {[{val:completedCount,label:"DONE",color:"#7CFC00"},{val:matches.length-completedCount,label:"LEFT",color:"#ff6b6b"},{val:matches.length,label:"TOTAL",color:"#fff"}].map(s => (
                      <div key={s.label}><div style={{fontSize:26,fontWeight:700,color:s.color}}>{s.val}</div><div style={{fontSize:10,color:"#555"}}>{s.label}</div></div>
                    ))}
                  </div>
                  <div style={{marginTop:12,textAlign:"center"}}>
                    <button onClick={() => { navigator.clipboard.writeText(shareUrl); alert("Link copied! Share on WhatsApp to let others join live."); }} style={{background:"#25D366",border:"none",borderRadius:20,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📲 SHARE THIS SESSION VIA WHATSAPP</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ---------- APP ----------
    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionID = urlParams.get('sessionID');
      const [showSetup, setShowSetup] = useState(!sessionID);

      if (showSetup) {
        return <SetupScreen />;
      } else {
        return <Scoresheet onReset={() => setShowSetup(true)} />;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
